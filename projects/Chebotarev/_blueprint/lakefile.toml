# Side-build for the CebotarevDensity Verso blueprint.
#
# Self-contained Lake package, DECOUPLED from AINTLIB's root lakefile: it lives entirely
# under projects/Chebotarev/_blueprint/ and is never referenced by the root workspace. It
# exists only to compile + render the Verso blueprint on the v4.31.0-rc2 toolchain.
#
# It reuses the already-built CebotarevDensity oleans by path-requiring the AINTLIB
# workspace (../../..), then adds the patched VersoBlueprint.
#
# mathlib is resolved as a PATH to AINTLIB main's already-built mathlib
# (../../../.lake/packages/mathlib) — NO git clone, NO `lake exe cache get`. Required LAST so
# its transitive pins (proofwidgets, batteries, aesop, Qq, …) win over VersoBlueprint's older
# manifest.
#
# DISK SAFETY: never run `lake update` on this side-build. The committed lake-manifest.json is
# authoritative; `lake update` would try to re-resolve mathlib and (on this ~99%-full disk) a
# 7 GB clone would fill it. Provision .lake/packages by hardlink-copying a sibling side-build's
# packages (cp -al ../../LeanModularForms/_blueprint/.lake/packages/* .lake/packages/).
#
# The blueprint .lean sources live one directory up, in projects/Chebotarev/
# (root module `CebotarevDensityBlueprint`, renderer `CebotarevDensityBlueprintMain`);
# srcDir = ".." picks them up.
name = "CebotarevDensityBlueprintBuild"
defaultTargets = ["CebotarevDensityBlueprint"]

[leanOptions]
pp.unicode.fun = true

# Reuse the workspace's built CebotarevDensity oleans.
[[require]]
name = "AINTLIB"
path = "../../.."

[[require]]
name = "VersoBlueprint"
git = "https://github.com/leanprover/verso-blueprint"
rev = "v4.30.0"

# mathlib LAST, as a PATH to AINTLIB main's built mathlib (no clone).
[[require]]
name = "mathlib"
path = "../../../.lake/packages/mathlib"

# The blueprint library + its renderer entry point both live one dir up.
[[lean_lib]]
name = "CebotarevDensityBlueprint"
srcDir = ".."
globs = ["CebotarevDensityBlueprint"]

[[lean_lib]]
name = "CebotarevDensityBlueprintMain"
srcDir = ".."
globs = ["CebotarevDensityBlueprintMain"]
