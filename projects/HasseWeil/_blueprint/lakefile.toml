# Side-build for the HasseWeil Verso blueprint.
#
# Self-contained Lake package, DECOUPLED from AINTLIB's root lakefile: it lives
# entirely under projects/HasseWeil/_blueprint/ and is never referenced by the
# root workspace. It exists only to compile + render the Verso blueprint on the
# v4.31.0-rc2 toolchain.
#
# It reuses the already-built HasseWeil oleans by path-requiring the AINTLIB
# workspace (../../..), then adds the patched VersoBlueprint. mathlib is pinned to
# d90090f and required LAST so its transitive deps (proofwidgets, batteries,
# aesop, …) win over VersoBlueprint's older manifest — otherwise
# `lake exe cache get` computes wrong hashes.
#
# The blueprint .lean sources live one directory up, in projects/HasseWeil/
# (root module `HasseWeilBlueprint`, renderer `HasseWeilBlueprintMain`); these are
# SIBLING modules of the `HasseWeil` lib, so the root workspace's lib glob
# (HasseWeil + HasseWeil.*) never picks them up. srcDir = ".." picks them up here.
name = "HasseWeilBlueprintBuild"
defaultTargets = ["HasseWeilBlueprint"]

[leanOptions]
pp.unicode.fun = true

# Reuse the workspace's built HasseWeil oleans.
[[require]]
name = "AINTLIB"
path = "../../.."

[[require]]
name = "VersoBlueprint"
git = "https://github.com/leanprover/verso-blueprint"
rev = "v4.30.0"

# mathlib LAST so its transitive pins win the reconciliation.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "d90090f647ca"

# The blueprint library + its renderer entry point both live one dir up.
[[lean_lib]]
name = "HasseWeilBlueprint"
srcDir = ".."
globs = ["HasseWeilBlueprint"]

[[lean_lib]]
name = "HasseWeilBlueprintMain"
srcDir = ".."
globs = ["HasseWeilBlueprintMain"]
