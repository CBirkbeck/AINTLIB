# Side-build for the Strong Multiplicity One Verso blueprint.
#
# Self-contained Lake package, DECOUPLED from AINTLIB's root lakefile: it lives
# entirely under projects/LeanModularForms/_blueprint_smo/ and is never referenced
# by the root workspace. It exists only to compile + render the Verso blueprint on
# the v4.31.0-rc2 toolchain.
#
# It reuses the already-built LeanModularForms (HeckeRing.GL2 / SMO) oleans by
# path-requiring the AINTLIB workspace (../../..), then adds the patched
# VersoBlueprint. mathlib is pinned to d90090f and required LAST so its transitive
# deps win over VersoBlueprint's older manifest.
#
# The blueprint .lean sources live one directory up, in projects/LeanModularForms/
# (root module `LeanModularFormsSMOBlueprint`, renderer
# `LeanModularFormsSMOBlueprintMain`); these are SIBLING modules of the
# `LeanModularForms` lib, so the root workspace's lib glob never picks them up.
name = "LeanModularFormsSMOBlueprintBuild"
defaultTargets = ["LeanModularFormsSMOBlueprint"]

[leanOptions]
pp.unicode.fun = true

# Reuse the workspace's built LeanModularForms (HeckeRing.GL2 / SMO) oleans.
[[require]]
name = "AINTLIB"
path = "../../.."

[[require]]
name = "VersoBlueprint"
git = "https://github.com/leanprover/verso-blueprint"
rev = "v4.30.0"

# mathlib LAST so its transitive pins win the reconciliation.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "d90090f647ca"

# The blueprint library + its renderer entry point both live one dir up.
[[lean_lib]]
name = "LeanModularFormsSMOBlueprint"
srcDir = ".."
globs = ["LeanModularFormsSMOBlueprint"]

[[lean_lib]]
name = "LeanModularFormsSMOBlueprintMain"
srcDir = ".."
globs = ["LeanModularFormsSMOBlueprintMain"]
