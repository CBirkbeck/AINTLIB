# AINTLIB consolidation monorepo — vendored-source provenance.
#
# One record per vendored project: where it came from (origin repo + canonical branch +
# the exact commit synced), where it lives in the workspace, and its bump status relative
# to the pinned mathlib. `scripts/pr-back.sh` reads `origin` + `branch` to route cleaned
# results back upstream.
#
# (The blueprint atlas's richer source catalogue is preserved on the `blueprint-atlas` branch.)
#
# Pinned mathlib for the whole workspace: d90090f647ca (v4.31.0-rc2). Vendored 2026-06-15.

pinned_mathlib = "d90090f647ca"
toolchain = "leanprover/lean4:v4.31.0-rc2"

[projects.FltRegularBernoulli]
origin = "https://github.com/CBirkbeck/flt-regular-bernoulli.git"
branch = "master"
synced_commit = "1cb08c4efa44"
origin_mathlib = "1680840431e2"          # rc2, different commit → tiny reconcile to the pin
dir = "projects/FltRegularBernoulli"
lib = "BernoulliRegular"
external_require = "flt-regular @ 29a3bb88f596"   # imports FltRegular.* (42×)
status = "needs-reconcile"               # 1680840 → d90090f + flt-regular against d90090f

