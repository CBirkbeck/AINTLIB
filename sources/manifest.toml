# AINTLIB sources manifest
#
# One [[source]] per source repo we mine for the blueprint. `commit` pins the exact
# revision the blueprint's prose + (lean := …) references were authored against;
# `https://<remote>/tree/<commit>` is a stable permalink. Repos are read locally for
# mining (not vendored). `status = "confirmed"` flips to "confirmed" after the
# catalogue sign-off (see sources/catalogue.md).
#
# Fields: name, kind (local|external), status (confirmed|candidate), remote, commit,
#         lean (toolchain), has_blueprint (own blueprint dir), chapters (target chapters).

